apiVersion: core.gardener.cloud/v1beta1
kind: Shoot
metadata:
  name: root
  namespace: garden
spec:
  # TODO(acumino): Uncomment this once the shoot reconciler is enabled in the gardenlet for self-hosted shoots.
  # provider:
  #   workers:
  #   - name: control-plane
  #     controlPlane:
  #       backup:
  #         provider: local
  #         credentialsRef:
  #           apiVersion: v1
  #           kind: Secret
  #           name: backup-local
  #           namespace: garden
  #     machine:
  #       type: local
  #       image:
  #         name: local
  #     minimum: 1
  #     maximum: 1
  #     updateStrategy: AutoInPlaceUpdate
  #     kubernetes:
  #       # One minor below the shoot-level version so the e2e in-place update test can bump it.
  #       version: "1.34.3"
  #   - name: worker
  #     machine:
  #       type: local
  #       image:
  #         name: local
  #     minimum: 1
  #     maximum: 2
  #     systemComponents:
  #       allow: true
  #     kubernetes:
  #       kubelet:
  #         maxPods: 250
  #     updateStrategy: AutoInPlaceUpdate
  networking:
    # Must be within 172.18.0.0/24 (range of kind Docker network), generally same settings as used in a kind cluster
    nodes: 172.18.0.0/24
    pods: 10.0.0.0/15
    services: 10.2.0.0/16
    # Use calico-ipam so that pod IPs are allocated from the Calico IPPool rather than from the node's podCIDR.
    providerConfig:
      apiVersion: calico.networking.extensions.gardener.cloud/v1alpha1
      kind: NetworkConfig
      ipam:
        type: calico-ipam
