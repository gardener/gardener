apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: machine
  labels:
    app: machine
spec:
  replicas: 4
  serviceName: "machine"
  selector:
    matchLabels:
      app: machine
  template:
    metadata:
      labels:
        app: machine
      annotations:
        cni.projectcalico.org/ipv4pools: '["gardenadm-unmanaged-infra"]'
    spec:
      initContainers:
      # The main container mounts several directories from the persistent volume so that state written by gardenadm survives pod restarts.
      # On the very first boot the volume subPaths are empty, so this init container seeds them from the image's default files.
      # On subsequent boots the directories are already populated and the copy is skipped, preserving any changes made at runtime.
      # For /etc/containerd, it also patches config_path so containerd finds the registry mirror configuration in /etc/containerd/certs.d from the very first start.
      - name: init-machine-state
        image: local-skaffold/gardener-extension-provider-local-node
        command:
        - sh
        - -c
        - |
          if [ -z "$(ls -A /mnt/systemd-system)" ]; then
            cp -a /etc/systemd/system/. /mnt/systemd-system/
          fi
          if [ -z "$(ls -A /mnt/containerd)" ]; then
            cp -a /etc/containerd/. /mnt/containerd/
            # Ensure containerd finds registry mirror configs in /etc/containerd/certs.d.
            # The base image ships without config_path, so we inject it here.
            if ! grep -q 'config_path' /mnt/containerd/config.toml; then
              sed -i '/^\[plugins\."io\.containerd\.grpc\.v1\.cri"\.containerd\]$/a\  config_path = "/etc/containerd/certs.d"' /mnt/containerd/config.toml
            fi
          fi
        volumeMounts:
        - name: machine-state
          mountPath: /mnt/systemd-system
          subPath: systemd-system
        - name: machine-state
          mountPath: /mnt/containerd
          subPath: containerd
      containers:
      - name: node
        image: local-skaffold/gardener-extension-provider-local-node
        securityContext:
          privileged: true
        env:
          - name: PATH
            value: /gardenadm:/usr/local/sbin:/usr/local/bin:/usr/sbin:/usr/bin:/sbin:/bin
          - name: IMAGEVECTOR_OVERWRITE
            value: /gardenadm/imagevector-overwrite.yaml
          - name: IMAGEVECTOR_OVERWRITE_CHARTS
            value: /gardenadm/imagevector-overwrite-charts.yaml
          - name: IMAGEVECTOR_OVERWRITE_COMPONENTS
            value: /gardenadm/imagevector-overwrite-components.yaml
        volumeMounts:
        - name: containerd
          mountPath: /var/lib/containerd
        - name: modules
          mountPath: /lib/modules
          readOnly: true
        - name: etcd-backup
          mountPath: /etc/gardener/local-backupbuckets
        - name: gardenadm
          mountPath: /gardenadm
        - name: machine-state
          mountPath: /etc/containerd
          subPath: containerd
        - name: machine-state
          mountPath: /etc/cni/net.d
          subPath: cni-net-d
        - name: machine-state
          mountPath: /etc/kubernetes
          subPath: kubernetes
        - name: machine-state
          mountPath: /etc/systemd/system
          subPath: systemd-system
        - name: machine-state
          mountPath: /var/lib/static-pods
          subPath: static-pods
        - name: machine-state
          mountPath: /var/lib/kubelet
          subPath: kubelet
        - name: machine-state
          mountPath: /var/lib/gardenadm
          subPath: gardenadm-state
        - name: machine-state
          mountPath: /var/lib/gardener-node-agent
          subPath: gardener-node-agent
        - name: machine-state
          mountPath: /opt/bin
          subPath: opt-bin
        - name: machine-state
          mountPath: /root
          subPath: root-home
        - name: bashrc
          mountPath: /root/.bashrc
          subPath: bashrc
      # we don't want components of the self-hosted shoot cluster to communicate with the kind API server
      automountServiceAccountToken: false
      securityContext:
        seccompProfile:
          type: RuntimeDefault
      volumes:
      - name: containerd
        emptyDir: {}
      - name: modules
        hostPath:
          path: /lib/modules
      - name: etcd-backup
        hostPath:
          path: /etc/gardener/local-backupbuckets
      - name: bashrc
        configMap:
          name: machine-bashrc
  volumeClaimTemplates:
  - metadata:
      name: gardenadm
    spec:
      accessModes: ["ReadWriteOnce"]
      resources:
        requests:
          storage: 1Gi
  - metadata:
      name: machine-state
    spec:
      accessModes: ["ReadWriteOnce"]
      resources:
        requests:
          storage: 2Gi
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: machine-bashrc
  labels:
    app: unmanaged-infra-machine
data:
  bashrc: |
    export KUBECONFIG=/etc/kubernetes/admin.conf
    export HISTFILE=/root/.bash_history
    alias k=kubectl
    alias kg='kubectl -n garden'
