apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: machine
  labels:
    app: machine
spec:
  replicas: 4
  serviceName: "machine"
  selector:
    matchLabels:
      app: machine
  template:
    metadata:
      labels:
        app: machine
      annotations:
        cni.projectcalico.org/ipv4pools: '["gardenadm-unmanaged-infra"]'
    spec:
      initContainers:
      # The main container mounts /etc/systemd/system from the persistent volume so that systemd
      # unit files written by gardenadm survive pod restarts. On the very first boot the volume
      # subPath is empty, so this init container seeds it from the image's default unit files.
      # On subsequent boots the directory is already populated and the copy is skipped, preserving
      # any changes made at runtime.
      - name: init-systemd-system
        image: local-skaffold/gardener-extension-provider-local-node
        command:
        - sh
        - -c
        - |
          if [ -z "$(ls -A /mnt/systemd-system)" ]; then
            cp -a /etc/systemd/system/. /mnt/systemd-system/
          fi
        volumeMounts:
        - name: machine-state
          mountPath: /mnt/systemd-system
          subPath: systemd-system
      containers:
      - name: node
        image: local-skaffold/gardener-extension-provider-local-node
        securityContext:
          privileged: true
        env:
          - name: PATH
            value: /gardenadm:/usr/local/sbin:/usr/local/bin:/usr/sbin:/usr/bin:/sbin:/bin
          - name: IMAGEVECTOR_OVERWRITE
            value: /gardenadm/imagevector-overwrite.yaml
          - name: IMAGEVECTOR_OVERWRITE_CHARTS
            value: /gardenadm/imagevector-overwrite-charts.yaml
        volumeMounts:
        - name: containerd
          mountPath: /var/lib/containerd
        - name: modules
          mountPath: /lib/modules
          readOnly: true
        - name: etcd-backup
          mountPath: /etc/gardener/local-backupbuckets
        - name: machine-state
          mountPath: /gardenadm
          subPath: gardenadm
        - name: machine-state
          mountPath: /etc/kubernetes
          subPath: kubernetes
        - name: machine-state
          mountPath: /etc/systemd/system
          subPath: systemd-system
        - name: machine-state
          mountPath: /var/lib/static-pods
          subPath: static-pods
        - name: machine-state
          mountPath: /var/lib/kubelet
          subPath: kubelet
        - name: machine-state
          mountPath: /var/lib/gardenadm
          subPath: gardenadm-state
        - name: machine-state
          mountPath: /var/lib/gardener-node-agent
          subPath: gardener-node-agent
        - name: machine-state
          mountPath: /opt/bin
          subPath: opt-bin
        - name: machine-state
          mountPath: /root
          subPath: root-home
        - name: bashrc
          mountPath: /root/.bashrc
          subPath: bashrc
      # we don't want components of the self-hosted shoot cluster to communicate with the kind API server
      automountServiceAccountToken: false
      hostAliases:
        - hostnames:
          - api.root.garden.external.local.gardener.cloud
          ip: 10.2.0.99
      securityContext:
        seccompProfile:
          type: RuntimeDefault
      volumes:
      - name: containerd
        emptyDir: {}
      - name: modules
        hostPath:
          path: /lib/modules
      - name: etcd-backup
        hostPath:
          path: /etc/gardener/local-backupbuckets
      - name: bashrc
        configMap:
          name: machine-bashrc
  volumeClaimTemplates:
  - metadata:
      name: machine-state
    spec:
      accessModes: ["ReadWriteOnce"]
      resources:
        requests:
          storage: 2Gi
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: machine-bashrc
  labels:
    app: unmanaged-infra-machine
data:
  bashrc: |
    export KUBECONFIG=/etc/kubernetes/admin.conf
    export HISTFILE=/root/.bash_history
    alias k=kubectl
    alias kg='kubectl -n garden'
