apiVersion: v1
kind: Service
metadata:
  name: control-plane-machine
spec:
  ports:
  # Used to talk to the self-hosted shoot API server from the host machine.
  - name: self-hosted-shoot-apiserver
    port: 4431
    targetPort: 443
    nodePort: 30003
  selector:
    app: machine
    apps.kubernetes.io/pod-index: "0"
  type: NodePort
