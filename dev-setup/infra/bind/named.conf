options {
    directory "/var/cache/bind";

    listen-on { any; };
    listen-on-v6 { any; };

    recursion yes;
    allow-query { any; };
    allow-recursion { any; };

    # Use Docker's built-in DNS server as an upstream server for all zones that we don't manage ourselves.
    forwarders {
        127.0.0.11;
    };

    # Docker's built-in DNS server doesn't support DNSSEC, so we need to disable DNSSEC to getting forwarding working.
    dnssec-validation no;
};

zone "local.gardener.cloud" {
    type master;
    file "/var/lib/bind/db.local.gardener.cloud";

    allow-update { any; };
};

include "/etc/bind/gardener-extension-provider-local.key";
