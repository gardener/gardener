apiVersion: v1
kind: Service
metadata:
  name: {{ .Values.serviceName }}
  namespace: {{ .Release.Namespace }}
  annotations:
    networking.resources.gardener.cloud/from-world-to-ports: '[{{ if .Values.httpProxy.legacyPort.enabled }}{"port":{{ .Values.httpProxy.legacyPort.port }},"protocol":"TCP"},{{ end }}{"port":8443,"protocol":"TCP"},{"port":9443,"protocol":"TCP"}]'
    networking.resources.gardener.cloud/namespace-selectors: '[{"matchLabels":{"gardener.cloud/role":"extension"}},{"matchLabels":{"gardener.cloud/role":"shoot"}},{"matchLabels":{"kubernetes.io/metadata.name":"garden"}}]'
    networking.resources.gardener.cloud/pod-label-selector-namespace-alias: all-istio-ingresses
    networking.resources.gardener.cloud/from-all-seed-scrape-targets-allowed-ports: '[{"port":15090,"protocol":"TCP"}]'
{{- if .Values.annotations }}
{{ .Values.annotations | toYaml | indent 4 }}
{{- end }}
  labels:
    app.kubernetes.io/version: {{ .Values.ingressVersion }}
    metrics-scrape-target: "true"
{{ .Values.labels | toYaml | indent 4 }}
spec:
  type: {{ .Values.serviceType }}
  selector:
{{ .Values.labels  | toYaml | indent 4 }}
  ports:
{{- if .Values.ports }}
{{ toYaml .Values.ports | indent 2 }}
{{- end }}
{{- if .Values.loadBalancerIP }}
  loadBalancerIP: {{ .Values.loadBalancerIP }}
{{- end }}
{{- with .Values.loadBalancerClass }}
  loadBalancerClass: {{ . | quote }}
{{- end }}
{{- if .Values.externalTrafficPolicy }}
  externalTrafficPolicy: {{ .Values.externalTrafficPolicy }}
{{- end }}
{{- if eq .Values.dualStack true }}
  ipFamilies:
  - IPv6
  - IPv4
  ipFamilyPolicy: PreferDualStack
{{- end }}
