apiVersion: operator.gardener.cloud/v1alpha1
kind: Extension
metadata:
  annotations:
    security.gardener.cloud/pod-security-enforce: baseline
  name: provider-local
spec:
  deployment:
    admission:
      runtimeCluster:
        helm:
          ociRepository:
            ref: local-skaffold/gardener-extension-admission-local/charts/runtime:v0.0.0
      values: {}
      virtualCluster:
        helm:
          ociRepository:
            ref: local-skaffold/gardener-extension-admission-local/charts/application:v0.0.0
    extension:
      helm:
        ociRepository:
          ref: local-skaffold/gardener-extension-provider-local/charts/extension:v0.0.0
      runtimeClusterValues: {}
      values: {}
  resources:
  - kind: BackupBucket
    type: local
  - kind: BackupEntry
    type: local
  - kind: Bastion
    type: local
  - kind: ControlPlane
    type: local
  - kind: DNSRecord
    type: local
  - kind: Infrastructure
    type: local
  - kind: Worker
    type: local
